#  IRSA ServiceAccount for ESO
#    Annotate with the IAM role ARN that has secretsmanager:GetSecretValue
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: external-secrets
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::055679187412:role/external-secrets-role